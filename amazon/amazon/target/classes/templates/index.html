<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1e1e1e;
    --border: #2e2e2e;
    --accent: #c9a84c;
    --accent-dim: #a07c30;
    --text: #f0ece4;
    --muted: #7a7570;
    --input-bg: #111111;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 10% 80%, rgba(201,168,76,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  .page-wrapper {
    width: 100%;
    max-width: 560px;
    animation: fadeUp 0.7s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header { margin-bottom: 36px; }
  .header-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 10px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    font-weight: 700;
    line-height: 1.15;
    color: var(--text);
  }

  .header h1 span { color: var(--accent); }

  .divider {
    width: 48px;
    height: 2px;
    background: var(--accent);
    margin-top: 18px;
    border-radius: 2px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .field { margin-bottom: 28px; }

  .field label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 10px;
  }

  .field label .icon { width: 16px; height: 16px; opacity: 0.7; }

  .field input[type="text"] {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.2s;
    -webkit-appearance: none;
  }

  .field input[type="text"]::placeholder { color: var(--muted); opacity: 0.5; }

  .field input[type="text"]:focus {
    border-color: var(--accent);
    background: #141414;
    box-shadow: 0 0 0 3px rgba(201,168,76,0.12), 0 2px 12px rgba(0,0,0,0.3);
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 28px;
  }

  .field-row .field { margin-bottom: 0; }

  .submit-wrap { margin-top: 8px; }

  input[type="submit"] {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.22s, transform 0.15s, box-shadow 0.22s;
    position: relative;
    overflow: hidden;
  }

  input[type="submit"]:hover {
    background: #d9b85c;
    box-shadow: 0 8px 28px rgba(201,168,76,0.3);
    transform: translateY(-1px);
  }

  input[type="submit"]:active {
    transform: translateY(0);
    background: var(--accent-dim);
  }

  .foot-note {
    margin-top: 20px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="page-wrapper">
  <div class="header">
    <p class="header-label">Inventory Management</p>
    <h1>Add New <span>Product</span></h1>
    <div class="divider"></div>
  </div>

  <div class="card">
    <form action="abc" method="post">

      <div class="field">
        <label>
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="3" width="12" height="10" rx="2"/>
            <path d="M5 7h6M5 10h4"/>
          </svg>
          Product name
        </label>
        <input type="text" name="name" placeholder="e.g. Wireless Headphones">
      </div>

      <div class="field-row">
        <div class="field">
          <label>
            <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M8 2v12M5 5h4.5a2 2 0 010 4H5"/>
            </svg>
            Product quantity
          </label>
          <input type="text" name="quantity" placeholder="e.g. 50">
        </div>

        <div class="field">
          <label>
            <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="8" cy="8" r="6"/>
              <path d="M8 5v1.5M8 9.5V11M6 6.5a2 2 0 114 0c0 1-1 1.5-2 2"/>
            </svg>
            Product price
          </label>
          <input type="text" name="price" placeholder="e.g. 29.99">
        </div>
      </div>

      <div class="submit-wrap">
        <input type="submit">
      </div>

    </form>
  </div>

  <p class="foot-note">All fields are required to list a product.</p>
</div>

</body>
</html>
